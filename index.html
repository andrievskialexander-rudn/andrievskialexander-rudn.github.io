<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Alexander Andrievski — Project Manager · Low-Current Systems (AV / SCS)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Armenian:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- print page size is swapped by JS when orientation changes -->
<style id="page-rule">@page { size: A4; margin: 9mm; }</style>

<style>
:root{
  --bg:#070A0D; --sheet:#0E1318; --side:#0A0F14; --line:#232B34; --chip:#141B23;
  --ink:#F2F5F8; --muted:#96A0AC; --faint:#6A7480;
  --ember:#FF5A2C; --ember-2:#FFA23B; --ember-deep:#E23A1E;
  --glow:rgba(255,90,44,.30);
  --spine:linear-gradient(180deg,#FFA23B 0%,#FF5A2C 45%,#E23A1E 100%);
  --f-display:'Space Grotesk','Noto Sans Armenian','Inter',system-ui,sans-serif;
  --f-body:'Inter','Noto Sans Armenian',system-ui,sans-serif;
  --f-mono:'JetBrains Mono','Noto Sans Armenian',ui-monospace,monospace;
  --pad:clamp(20px,3vw,32px);
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--bg); color:var(--ink); font-family:var(--f-body);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  min-height:100vh;
}
/* ambient data-center atmosphere */
body::before{
  content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(900px 420px at 78% -8%, var(--glow), transparent 60%),
    radial-gradient(700px 380px at 6% 108%, rgba(255,90,44,.10), transparent 60%),
    repeating-linear-gradient(0deg, rgba(255,255,255,.022) 0 1px, transparent 1px 46px),
    repeating-linear-gradient(90deg, rgba(255,255,255,.022) 0 1px, transparent 1px 46px);
}
a{color:inherit;text-decoration:none}

/* ---------- toolbar ---------- */
.bar{
  position:sticky; top:0; z-index:10;
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  padding:11px clamp(14px,4vw,40px);
  background:rgba(8,11,14,.82); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex; align-items:center; gap:10px; margin-right:auto}
.brand .mark{width:26px;height:26px;display:block;filter:drop-shadow(0 0 10px var(--glow))}
.brand b{font-family:var(--f-display); font-weight:600; letter-spacing:.01em; font-size:.95rem}
.brand .who{font-family:var(--f-mono); font-size:.6rem; color:var(--faint); letter-spacing:.18em; text-transform:uppercase; display:block; margin-top:1px}
.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.seg{display:inline-flex; padding:3px; gap:2px; background:var(--chip); border:1px solid var(--line); border-radius:999px}
.seg button{
  font-family:var(--f-mono); font-size:.72rem; letter-spacing:.04em;
  color:var(--muted); background:transparent; border:0; cursor:pointer;
  padding:6px 11px; border-radius:999px; line-height:1; transition:.18s;
}
.seg button:hover{color:var(--ink)}
.seg button[aria-pressed="true"]{ color:#0a0c0f; background:linear-gradient(180deg,var(--ember-2),var(--ember)); font-weight:500; }
.seg.orient button{display:inline-flex; align-items:center; gap:6px}
.seg.orient svg{width:14px;height:14px}
.print{
  display:inline-flex; align-items:center; gap:8px; cursor:pointer;
  font-family:var(--f-mono); font-size:.74rem; letter-spacing:.04em; color:var(--ink);
  padding:8px 14px; border-radius:999px; border:1px solid transparent;
  background:linear-gradient(180deg,rgba(255,162,59,.16),rgba(255,90,44,.16));
  box-shadow:inset 0 0 0 1px rgba(255,90,44,.45);
  transition:.18s;
}
.print:hover{box-shadow:inset 0 0 0 1px var(--ember), 0 0 22px var(--glow)}
.print svg{width:15px;height:15px}

/* ---------- stage + sheet ---------- */
.stage{position:relative; z-index:1; padding:clamp(16px,3.5vw,40px); display:flex; justify-content:center}
.sheet{
  width:100%; background:var(--sheet); color:var(--ink);
  border:1px solid rgba(255,255,255,.055); border-radius:16px;
  box-shadow:0 34px 90px rgba(0,0,0,.6);
  overflow:hidden; position:relative;
  animation:rise .5s cubic-bezier(.2,.7,.2,1) both;
}
@keyframes rise{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}
.sheet{max-width:1240px}

/* ---------- sidebar ---------- */
.side{position:relative; padding:var(--pad)}
.extra{padding:var(--pad)}
.side::before{ content:""; position:absolute; left:0; right:0; top:0; height:3px; background:var(--spine); }
.identity .name{
  font-family:var(--f-display); font-weight:600; line-height:1.02;
  font-size:clamp(1.7rem,5vw,2.35rem); letter-spacing:-.015em; margin:2px 0 0;
}
.identity .role{
  font-family:var(--f-mono); text-transform:uppercase; letter-spacing:.14em;
  font-size:.66rem; color:var(--ember-2); margin:12px 0 0; line-height:1.5;
}
.side-block{margin-top:26px}
.eyebrow{
  font-family:var(--f-mono); text-transform:uppercase; letter-spacing:.16em;
  font-size:.62rem; color:var(--faint); margin:0 0 12px; display:flex; align-items:center; gap:8px;
}
.eyebrow::before{ content:""; width:14px; height:2px; background:var(--spine); border-radius:2px; flex:none; }
.meta{list-style:none; margin:0; padding:0; display:grid; gap:7px}
.meta li{font-family:var(--f-mono); font-size:.74rem; color:var(--muted); line-height:1.4; word-break:break-word}
.meta .mail:hover{color:var(--ember-2)}
.meta .relo{color:var(--ember-2)}
.meta .citz{color:var(--ember-2)}

.skill-group{margin-bottom:13px}
.skill-cap{font-family:var(--f-mono); font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:0 0 7px}
.chips{display:flex; flex-wrap:wrap; gap:6px}
.chip{
  font-size:.71rem; font-weight:500; color:var(--muted);
  background:var(--chip); border:1px solid var(--line);
  padding:4px 9px; border-radius:999px; line-height:1.3; transition:.16s;
}
.chip:hover{color:var(--ink); border-color:rgba(255,90,44,.5)}

.edu-school{font-family:var(--f-display); font-weight:600; font-size:.92rem; margin:0}
.edu-full{font-size:.74rem; color:var(--muted); margin:3px 0 0}
.edu-field{font-size:.8rem; color:var(--ink); margin:7px 0 0; font-weight:500}
.edu-note{font-size:.74rem; color:var(--muted); margin:5px 0 0; line-height:1.45}
.langlist{list-style:none; margin:0; padding:0; display:grid; gap:6px}
.langlist li{font-size:.78rem; color:var(--muted)}
.langlist b{color:var(--ink); font-weight:600}

/* ---------- body ---------- */
.body{position:relative; padding:var(--pad)}
.section-title{
  font-family:var(--f-display); font-weight:600; text-transform:uppercase;
  letter-spacing:.14em; font-size:.82rem; color:var(--ink);
  margin:0 0 16px; display:flex; align-items:center; gap:10px;
}
.section-title::before{ content:""; width:4px; height:15px; background:var(--spine); border-radius:2px; flex:none; box-shadow:0 0 12px var(--glow); }
.block + .block, .body-cols{margin-top:26px}
.lead{font-size:.93rem; line-height:1.62; color:#D9DEE5; margin:0}
.profile .eyebrow{margin-bottom:10px}

/* experience timeline */
.timeline{position:relative; padding-left:22px}
.timeline::before{ content:""; position:absolute; left:6px; top:8px; bottom:6px; width:2px;
  background:linear-gradient(180deg,var(--ember) 0%, rgba(255,90,44,.18) 92%, transparent); border-radius:2px; }
.job{position:relative; padding:0 0 18px}
.job:last-child{padding-bottom:0}
.job::before{ content:""; position:absolute; left:-19.5px; top:5px; width:11px; height:11px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--ember-2), var(--ember)); box-shadow:0 0 0 3px rgba(255,90,44,.16), 0 0 12px var(--glow); }
.job-head{display:flex; justify-content:space-between; align-items:baseline; gap:12px; flex-wrap:wrap}
.job-title{font-family:var(--f-display); font-weight:600; font-size:.96rem; color:var(--ink); margin:0; line-height:1.25}
.job-date{font-family:var(--f-mono); font-size:.68rem; color:var(--faint); letter-spacing:.03em; white-space:nowrap}
.job-org{font-size:.8rem; margin:4px 0 0; color:var(--ember-2); font-weight:500}
.job-org .note{color:var(--muted); font-weight:400}
.bullets{list-style:none; margin:9px 0 0; padding:0; display:grid; gap:6px}
.bullets li{position:relative; padding-left:15px; font-size:.83rem; line-height:1.5; color:#C7CDD5}
.bullets li::before{ content:""; position:absolute; left:0; top:.55em; width:5px; height:5px; border-radius:1.5px; background:var(--ember); }
.proj .bullets{margin-top:0}

/* ---------- responsive grid ---------- */
@media (min-width:720px){
  .sheet{
    display:grid;
    grid-template-columns:minmax(220px,31%) 1fr;
    grid-template-rows:auto 1fr;
    grid-template-areas:"idn body" "ext body";
    align-items:start;
  }
  .side{grid-area:idn}
  .extra{grid-area:ext; align-self:start; padding-top:4px; border-top:0}
  .body{grid-area:body; border-top:0}
  .side::before{display:none}
  .body::before{ content:""; position:absolute; left:0; top:var(--pad); bottom:var(--pad); width:2px; background:var(--spine); border-radius:2px; }
}
@media (min-width:1100px){
  .body-cols{display:grid; grid-template-columns:1.15fr 1fr; gap:30px; align-items:start}
  .body-cols > .block + .block{margin-top:0}
}
@media (max-width:719px){
  .body{border-top:1px solid var(--line)}
  .extra{border-top:1px solid var(--line)}
}
@media (max-width:430px){ .brand .who{display:none} .brand b{font-size:.86rem} }

@media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important} }

/* ---------- print: clean A4 ---------- */
@media print{
  :root{--ink:#11161c; --muted:#3f4a57; --faint:#6a7480; --line:#d7dce2; --chip:#fff; --sheet:#fff; --side:#fff; --bg:#fff}
  html{font-size:11.5px}
  body{background:#fff; -webkit-print-color-adjust:exact; print-color-adjust:exact}
  body::before{display:none}
  .bar{display:none}
  .stage{padding:0; display:block}
  .sheet{max-width:none; width:100%; margin:0; border:0; border-radius:0; box-shadow:none; animation:none; background:#fff; color:#11161c}
  .sheet{display:grid; grid-template-columns:34% 1fr; grid-template-rows:auto 1fr; grid-template-areas:"idn body" "ext body"}
  .side{grid-area:idn; padding:0 14px 0 0}
  .extra{grid-area:ext; padding:10px 14px 0 0; border-top:0 !important}
  .body{grid-area:body; padding:0 0 0 16px; border-left:1px solid var(--line) !important; border-top:0 !important}
  .side::before, .body::before{display:none}
  .body-cols{display:block}
  .lead{color:#222a33}
  .bullets li{color:#222a33}
  .chip{color:#2b333d; border:1px solid #c9ced6; background:#fff}
  .job{page-break-inside:avoid; break-inside:avoid}
  .section-title::before, .eyebrow::before, .job::before, .timeline::before, .identity .role, .job-org{ -webkit-print-color-adjust:exact; print-color-adjust:exact }
  .identity .name{font-size:16pt; line-height:1.0}
  .section-title{font-size:8.5pt; margin-bottom:3pt}
  .lead{font-size:7.8pt; line-height:1.23}
  .job-title{font-size:8.4pt}
  .job-org{font-size:7.6pt}
  .eyebrow{font-size:8.2pt; margin-bottom:3pt}
  .bullets li{font-size:7.4pt; line-height:1.2; margin-bottom:0.8pt}
  .meta li,.job-date,.skill-cap{font-size:7pt}
  .skill-cap{margin-bottom:2pt}
  .meta li{margin-bottom:0.8pt}
  .chip{font-size:6.7pt; padding:0.5px 4px}
  .chips{gap:3px}
  .block + .block, .body-cols{margin-top:5pt}
  .side-block + .side-block{margin-top:6pt}
  .job{padding-bottom:5pt}
  .skill-group{margin-bottom:4pt}

  /* Armenian is wordier: tighten a touch more so it still fits one page */
  html[lang="hy"] .identity .name{font-size:15pt}
  html[lang="hy"] .lead{font-size:7.1pt; line-height:1.16}
  html[lang="hy"] .bullets li{font-size:6.8pt; line-height:1.12; margin-bottom:0.4pt}
  html[lang="hy"] .job-title{font-size:7.8pt}
  html[lang="hy"] .job-org{font-size:7.1pt}
  html[lang="hy"] .section-title{font-size:8pt; margin-bottom:2.2pt}
  html[lang="hy"] .eyebrow{font-size:7.8pt; margin-bottom:2.2pt}
  html[lang="hy"] .chip{font-size:6.4pt}
  html[lang="hy"] .skill-cap, html[lang="hy"] .meta li, html[lang="hy"] .job-date{font-size:6.7pt}
  html[lang="hy"] .block + .block, html[lang="hy"] .body-cols{margin-top:3.5pt}
  html[lang="hy"] .job{padding-bottom:3pt}
  html[lang="hy"] .side-block + .side-block{margin-top:5pt}
}
</style>
</head>

function get(obj, path){ return path.split(".").reduce((o,k)=> (o==null?undefined:o[k]), obj); }

function render(lang){
  const d = I18N[lang];
  document.documentElement.lang = lang;

  document.querySelectorAll("[data-k]").forEach(el=>{
    const v = get(d, el.getAttribute("data-k"));
    if(typeof v === "string") el.textContent = v;
  });

  const mail = document.getElementById("emailLink");
  mail.textContent = CONTACT.email; mail.href = "mailto:"+CONTACT.email;

  // skills
  const sk = document.getElementById("skills"); sk.innerHTML = "";
  d.skills.forEach(g=>{
    const grp = document.createElement("div"); grp.className="skill-group";
    const cap = document.createElement("p"); cap.className="skill-cap"; cap.textContent=g.label; grp.appendChild(cap);
    const chips = document.createElement("div"); chips.className="chips";
    g.items.forEach(it=>{ const c=document.createElement("span"); c.className="chip"; c.textContent=it; chips.appendChild(c); });
    grp.appendChild(chips); sk.appendChild(grp);
  });

  // experience
  const ex = document.getElementById("experience"); ex.innerHTML="";
  d.jobs.forEach(j=>{
    const job=document.createElement("div"); job.className="job";
    const head=document.createElement("div"); head.className="job-head";
    const t=document.createElement("p"); t.className="job-title"; t.textContent=j.title;
    const dt=document.createElement("span"); dt.className="job-date"; dt.textContent=j.date;
    head.append(t,dt);
    const org=document.createElement("p"); org.className="job-org";
    org.innerHTML = j.org + '<span class="note">'+ (j.note||"") +'</span>';
    const ul=document.createElement("ul"); ul.className="bullets";
    j.points.forEach(p=>{ const li=document.createElement("li"); li.textContent=p; ul.appendChild(li); });
    job.append(head,org,ul); ex.appendChild(job);
  });

  // projects
  const pr=document.getElementById("projects"); pr.innerHTML="";
  d.projects.forEach(p=>{ const li=document.createElement("li"); li.textContent=p; pr.appendChild(li); });

  // languages
  const ll=document.getElementById("langlist"); ll.innerHTML="";
  d.languages.forEach(l=>{ const li=document.createElement("li"); li.innerHTML="<b>"+l.a+"</b>"+l.b; ll.appendChild(li); });

  // ui labels
  document.getElementById("lbl-print").textContent = d.ui.print;
  document.getElementById("who").textContent = d.role.split("·")[0].trim();
}

function setLang(lang){
  document.querySelectorAll("#langs button").forEach(b=> b.setAttribute("aria-pressed", b.dataset.lang===lang));
  render(lang);
}

document.getElementById("langs").addEventListener("click", e=>{ const b=e.target.closest("button"); if(b) setLang(b.dataset.lang); });
document.getElementById("printBtn").addEventListener("click", ()=> window.print());

setLang("en");
</script>
